<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCal</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <div class="top-bar">
        <button class="top-bar-btn">Home</button>
        <button class="top-bar-btn">Calendar</button>
        <button class="top-bar-btn">Voice</button>
        <button class="top-bar-btn">Settings</button>

    </div>



    <div class="main-container">
        <h1 class="container-title">Voice Control</h1>
        <p class="container-desc">Manage your calendar hands-free</p>
        <button class="primary-button">
            <img src="components/microphone.png" alt="Microphone Icon" class="button-icon">
        </button>

        <p class="container-desc2">Click to speak</p>

        <div class="speech-container">
        <p class="container-desc3">Schedule meeting for 2pm</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
