<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceCal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="top-bar">
        <button id="homepage" class="top-bar-btn">Home</button>
        <button id="voicepage" class="top-bar-btn">Voice</button>
    </div>

    <div class="main-container">
        <h1 class="container-title">Voice Control</h1>
        <p class="container-desc">Manage your calendar hands-free</p>

        <button class="primary-button" id="micButton">
            <img src="components/microphone.png" alt="Microphone Icon" class="button-icon">
        </button>

        <p class="container-desc2">Tap to speak &middot; tap again to stop</p>

        <div class="speech-container">
            <p id="status">Ready when you are</p>
        </div>

        <button id="calendarButton" class="calendar-button">
            <span class="calendar-dot"></span>
            Open Google Calendar
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
